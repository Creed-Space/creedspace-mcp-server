name: Publish to MCP Registry

# Publishes server.json to the Official MCP Registry using GitHub Actions OIDC.
# OIDC from this repo grants the io.github.Creed-Space/* namespace (the registry
# grants the repository owner's namespace to Actions runs — no user token needed).
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish
        run: mcp-publisher publish
