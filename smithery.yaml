# Smithery deployment config for the Creed Space MCP server.
# Docs: https://smithery.ai/docs/build/project-config
#
# Deployed on Smithery as a custom container. The image (see Dockerfile)
# defaults to stdio for the Docker MCP Catalog and `docker run -i` consumers;
# Smithery flips it to Streamable HTTP via the `env` block below, which the CLI
# reads (CREEDSPACE_TRANSPORT / CREEDSPACE_HOST). Smithery injects $PORT, which
# the Dockerfile maps onto --port.
runtime: container

startCommand:
  type: http
  # The server needs no credentials: it runs against the public Creed Space API
  # (https://api.creed.space) with sensible defaults. The hosted instance serves
  # the "ambassador" persona and the full tool set; persona/constitution can be
  # chosen per call via tool arguments. Nothing to configure, so the schema is
  # an empty object.
  configSchema:
    type: object
    properties: {}
    additionalProperties: false
  exampleConfig: {}

build:
  dockerfile: Dockerfile
  dockerBuildPath: "."

# Run the container in Streamable HTTP mode for Smithery's gateway.
# MCP_ALLOW_INSECURE_HTTP opts out of the server's "no unauthenticated
# non-loopback bind" guard: safe here because the container is not publicly
# exposed — Smithery's gateway is the only path in and handles client auth.
# It is set ONLY here, so anyone running the image directly keeps the guard.
env:
  CREEDSPACE_TRANSPORT: "http"
  CREEDSPACE_HOST: "0.0.0.0"
  MCP_ALLOW_INSECURE_HTTP: "true"
